<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<title>Conversor de almacenamiento</title>

<link rel="icon" href="icon.png">
<link rel="apple-touch-icon" href="icon.png">

<style>

*{
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
-webkit-tap-highlight-color:transparent;
}

body{
margin:0;
background:#0f172a;
color:white;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{

width:100%;
max-width:420px;
height:100vh;

display:flex;
flex-direction:column;

padding:8px;
background:#1e293b;

}

h1{
text-align:center;
font-size:18px;
margin:2px 0 6px 0;
}

.switch{
display:flex;
justify-content:center;
gap:8px;
margin-bottom:6px;
}

.switch button{
padding:4px 10px;
border:none;
border-radius:6px;
cursor:pointer;
background:#334155;
color:white;
font-size:12px;
}

.switch button.active{
background:#3b82f6;
}

.fields{
flex:1;
}

.field{
margin-bottom:3px;
}

.field label{
font-size:10px;
opacity:0.7;
}

.field input{
width:100%;
padding:6px;
border-radius:6px;
border:none;
background:#0f172a;
color:white;
font-size:14px;
margin-top:1px;
border:2px solid transparent;
}

.field input.active{
border-color:#3b82f6;
}

.keypad{

display:grid;
grid-template-columns:repeat(3,1fr);
gap:6px;

}

.key{
padding:12px;
background:#334155;
border-radius:8px;
text-align:center;
cursor:pointer;
font-size:18px;
user-select:none;
}

.key:active{
background:#3b82f6;
}

.clear{
grid-column:span 3;
background:#ef4444;
}

</style>

</head>

<body>

<div class="container">

<h1>Conversor de almacenamiento</h1>

<div class="switch">
<button id="binario" class="active">Binario</button>
<button id="decimal">Decimal</button>
</div>

<div class="fields">

<div class="field"><label>Bits</label><input id="bits" readonly></div>
<div class="field"><label>Bytes</label><input id="bytes" readonly></div>
<div class="field"><label>KB</label><input id="kb" readonly></div>
<div class="field"><label>MB</label><input id="mb" readonly></div>
<div class="field"><label>GB</label><input id="gb" readonly></div>
<div class="field"><label>TB</label><input id="tb" readonly></div>

</div>

<div class="keypad">

<div class="key">7</div>
<div class="key">8</div>
<div class="key">9</div>

<div class="key">4</div>
<div class="key">5</div>
<div class="key">6</div>

<div class="key">1</div>
<div class="key">2</div>
<div class="key">3</div>

<div class="key">0</div>
<div class="key">,</div>
<div class="key">⌫</div>

<div class="key clear">BORRAR</div>

</div>

</div>

<script>

let base = 1024
let activeInput = null
let replaceOnNextInput = false

const inputs = {
bits:document.getElementById("bits"),
bytes:document.getElementById("bytes"),
kb:document.getElementById("kb"),
mb:document.getElementById("mb"),
gb:document.getElementById("gb"),
tb:document.getElementById("tb")
}

function format(num){
return Number(num).toLocaleString('es-ES',{maximumFractionDigits:10})
}

function parseNumero(str){
return parseFloat(str.replace(/\./g,'').replace(',','.'))
}

function setActive(input){

Object.values(inputs).forEach(i=>{
i.classList.remove("active")
})

input.classList.add("active")
activeInput=input
replaceOnNextInput=true

}

Object.values(inputs).forEach(input=>{
input.addEventListener("click",()=>setActive(input))
})

function convert(unit){

let value=parseNumero(inputs[unit].value)

if(isNaN(value)) return

let bytes

switch(unit){

case "bits": bytes=value/8; break
case "bytes": bytes=value; break
case "kb": bytes=value*Math.pow(base,1); break
case "mb": bytes=value*Math.pow(base,2); break
case "gb": bytes=value*Math.pow(base,3); break
case "tb": bytes=value*Math.pow(base,4); break

}

inputs.bits.value=format(bytes*8)
inputs.bytes.value=format(bytes)
inputs.kb.value=format(bytes/Math.pow(base,1))
inputs.mb.value=format(bytes/Math.pow(base,2))
inputs.gb.value=format(bytes/Math.pow(base,3))
inputs.tb.value=format(bytes/Math.pow(base,4))

}

document.querySelectorAll(".key").forEach(key=>{

key.addEventListener("click",()=>{

let value=key.innerText

if(value==="BORRAR"){

Object.values(inputs).forEach(i=>i.value="")
return

}

if(!activeInput) return

if(value==="⌫"){

activeInput.value=activeInput.value.slice(0,-1)
convert(activeInput.id)
return

}

if(replaceOnNextInput){
activeInput.value=value
replaceOnNextInput=false
}else{
activeInput.value+=value
}

convert(activeInput.id)

})

})

document.getElementById("binario").onclick=()=>{
base=1024
document.getElementById("binario").classList.add("active")
document.getElementById("decimal").classList.remove("active")
}

document.getElementById("decimal").onclick=()=>{
base=1000
document.getElementById("decimal").classList.add("active")
document.getElementById("binario").classList.remove("active")
}

</script>

</body>
</html>
